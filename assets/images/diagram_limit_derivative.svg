<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320" font-family="Georgia, serif">
  <rect width="680" height="320" fill="#fefefe" rx="12"/>

  <!-- ══ LEFT: Graph ══ -->

  <!-- axes -->
  <line x1="55" y1="270" x2="320" y2="270" stroke="#555" stroke-width="1.8"/>
  <line x1="55" y1="50"  x2="55"  y2="275" stroke="#555" stroke-width="1.8"/>
  <polygon points="320,270 312,266 312,274" fill="#555"/>
  <polygon points="55,47 51,55 59,55"       fill="#555"/>
  <text x="326" y="275" font-size="14" fill="#555" font-style="italic">x</text>
  <text x="60"  y="47"  font-size="14" fill="#555" font-style="italic">y</text>

  <!-- very curvy line - rises, dips, rises again to show y=mx+b is useless -->
  <path d="M 68,240 C 85,230 95,180 115,195 C 135,210 140,175 160,140 C 178,108 185,155 205,130 C 222,108 245,85 275,72 C 290,65 305,60 315,56"
        fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- point x at svg (150, 161) — on the curve -->
  <circle cx="150" cy="161" r="5" fill="#2940b0"/>
  <!-- point x+h at svg (220, 112) — on the curve -->
  <circle cx="220" cy="112" r="5" fill="#2940b0"/>

  <!-- vertical dashes -->
  <line x1="150" y1="161" x2="150" y2="270" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="220" y1="112" x2="220" y2="270" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- x-axis labels -->
  <text x="150" y="288" text-anchor="middle" font-size="14" fill="#2940b0" font-style="italic">x</text>
  <text x="220" y="288" text-anchor="middle" font-size="14" fill="#2940b0" font-style="italic">x+h</text>

  <!-- h brace -->
  <line x1="150" y1="298" x2="220" y2="298" stroke="#666" stroke-width="1.5"/>
  <line x1="150" y1="294" x2="150" y2="302" stroke="#666" stroke-width="1.5"/>
  <line x1="220" y1="294" x2="220" y2="302" stroke="#666" stroke-width="1.5"/>
  <text x="185" y="314" text-anchor="middle" font-size="13" fill="#555" font-style="italic">h</text>

  <!-- ══ RIGHT: Equation ══ -->

  <rect x="348" y="80" width="310" height="130" rx="10" fill="#dde4ff" stroke="#4361ee" stroke-width="2"/>

  <text x="368" y="120" font-size="20" fill="#2940b0" font-style="italic">f ′(x)  =</text>
  <text x="476" y="113" font-size="18" fill="#2940b0" font-style="italic">lim</text>
  <text x="476" y="130" font-size="12" fill="#2940b0">h → 0</text>

  <!-- fraction -->
  <text x="580" y="110" text-anchor="middle" font-size="17" fill="#2940b0">f(x+h) − f(x)</text>
  <line x1="516" y1="117" x2="644" y2="117" stroke="#2940b0" stroke-width="1.8"/>
  <text x="580" y="138" text-anchor="middle" font-size="17" fill="#2940b0">h</text>

  <text x="503" y="185" text-anchor="middle" font-size="13" fill="#555" font-family="Arial, sans-serif">slope at a single point</text>
</svg>
