<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="Arial, sans-serif">
  <rect width="860" height="420" fill="#f8faff" rx="14"/>

  <text x="430" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Action Chunking vs Single-Step Prediction</text>

  <defs>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#087255"/></marker>
  </defs>

  <!-- ══ LEFT PANEL: Single-step  rect y=48..378 h=330 ══ -->
  <rect x="20" y="48" width="400" height="330" rx="10" fill="#fff4f4" stroke="#c1121f" stroke-width="1.5"/>
  <text x="220" y="72"  text-anchor="middle" font-size="15" font-weight="bold" fill="#c1121f">Single-Step Prediction</text>
  <text x="220" y="90"  text-anchor="middle" font-size="12" fill="#888">one forward pass → one action</text>

  <!-- axes — kept well inside panel -->
  <line x1="55"  y1="290" x2="380" y2="290" stroke="#aaa" stroke-width="1.5"/>
  <line x1="55"  y1="120" x2="55"  y2="295" stroke="#aaa" stroke-width="1.5"/>
  <!-- labels inside panel -->
  <text x="375"  y="308" text-anchor="end" font-size="12" fill="#888" font-style="italic">time →</text>
  <text x="62"   y="118" font-size="11" fill="#888" font-style="italic">joint angle</text>

  <!-- noisy single-step path -->
  <polyline points="75,250 112,218 148,238 185,193 222,218 260,177 298,202 336,165 370,180"
    fill="none" stroke="#c1121f" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- dots at each step -->
  <circle cx="75"  cy="250" r="4" fill="#c1121f"/>
  <circle cx="112" cy="218" r="4" fill="#c1121f"/>
  <circle cx="148" cy="238" r="4" fill="#c1121f"/>
  <circle cx="185" cy="193" r="4" fill="#c1121f"/>
  <circle cx="222" cy="218" r="4" fill="#c1121f"/>
  <circle cx="260" cy="177" r="4" fill="#c1121f"/>
  <circle cx="298" cy="202" r="4" fill="#c1121f"/>
  <circle cx="336" cy="165" r="4" fill="#c1121f"/>

  <!-- model call labels below each dot -->
  <text x="93"  y="268" text-anchor="middle" font-size="10" fill="#c1121f">model</text>
  <text x="166" y="268" text-anchor="middle" font-size="10" fill="#c1121f">model</text>
  <text x="241" y="268" text-anchor="middle" font-size="10" fill="#c1121f">model</text>
  <text x="317" y="268" text-anchor="middle" font-size="10" fill="#c1121f">model</text>

  <!-- bottom caption — well inside panel (bottom=378) -->
  <text x="220" y="318" text-anchor="middle" font-size="12" fill="#c1121f">Many forward passes · noisy trajectory</text>
  <text x="220" y="338" text-anchor="middle" font-size="12" fill="#c1121f">each step predicted independently</text>

  <!-- ══ RIGHT PANEL: Chunking  rect y=48..378 h=330 ══ -->
  <rect x="440" y="48" width="400" height="330" rx="10" fill="#f0fff8" stroke="#087255" stroke-width="1.5"/>
  <text x="640" y="72"  text-anchor="middle" font-size="15" font-weight="bold" fill="#087255">Action Chunking</text>
  <text x="640" y="90"  text-anchor="middle" font-size="12" fill="#888">one forward pass → sequence of actions</text>

  <!-- axes -->
  <line x1="475" y1="290" x2="800" y2="290" stroke="#aaa" stroke-width="1.5"/>
  <line x1="475" y1="120" x2="475" y2="295" stroke="#aaa" stroke-width="1.5"/>
  <text x="795"  y="308" text-anchor="end" font-size="12" fill="#888" font-style="italic">time →</text>
  <text x="482"  y="118" font-size="11" fill="#888" font-style="italic">joint angle</text>

  <!-- smooth chunked path -->
  <path d="M 495,250 C 535,228 565,208 605,190 C 640,173 670,164 705,156 C 735,149 762,145 792,142"
    fill="none" stroke="#087255" stroke-width="2.5"/>

  <!-- chunk bracket below x-axis -->
  <line x1="495" y1="303" x2="645" y2="303" stroke="#087255" stroke-width="2"/>
  <line x1="495" y1="298" x2="495" y2="308" stroke="#087255" stroke-width="2"/>
  <line x1="645" y1="298" x2="645" y2="308" stroke="#087255" stroke-width="2"/>
  <text x="570"  y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#087255">chunk (e.g. 10 steps)</text>

  <!-- single model call box -->
  <rect x="476" y="155" width="82" height="28" rx="6" fill="#d1faf0" stroke="#087255" stroke-width="1.5"/>
  <text x="517" y="174" text-anchor="middle" font-size="11" font-weight="bold" fill="#087255">model ×1</text>
  <line x1="558" y1="169" x2="588" y2="169" stroke="#087255" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- dots on smooth chunk -->
  <circle cx="495" cy="250" r="4" fill="#087255"/>
  <circle cx="535" cy="228" r="4" fill="#087255"/>
  <circle cx="575" cy="206" r="4" fill="#087255"/>
  <circle cx="615" cy="186" r="4" fill="#087255"/>
  <circle cx="655" cy="169" r="4" fill="#087255"/>

  <!-- bottom caption — well inside panel (bottom=378) -->
  <text x="640" y="342" text-anchor="middle" font-size="12" fill="#087255">One forward pass · smooth coherent motion</text>
  <text x="640" y="362" text-anchor="middle" font-size="12" fill="#087255">steps jointly predicted in a single chunk</text>
</svg>
