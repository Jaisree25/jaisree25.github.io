<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400" font-family="Arial, sans-serif">
  <rect width="860" height="400" fill="#f8faff" rx="14"/>
  <text x="430" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Simple Self-Attention (No Trainable Weights)</text>
  <text x="430" y="46" text-anchor="middle" font-size="13" fill="#555" font-style="italic">Query token: "sat"  ·  Sentence: "The cat sat on the mat"</text>

  <defs>
    <marker id="arr"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#087255"/></marker>
  </defs>

  <!-- Step boxes -->

  <!-- STEP 1 -->
  <rect x="20" y="64" width="246" height="300" rx="10" fill="#dde4ff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="143" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#2940b0">① Dot Products</text>
  <text x="143" y="103" text-anchor="middle" font-size="11" fill="#555">xᵢ · x_query for each token</text>

  <!-- score bars -->
  <text x="42"  y="130" font-size="13" fill="#2940b0">The</text>
  <rect x="95"  y="116" width="8"   height="18" rx="2" fill="#4361ee" opacity="0.3"/>
  <text x="110" y="130" font-size="12" fill="#555">0.05</text>

  <text x="42"  y="160" font-size="13" fill="#2940b0">cat</text>
  <rect x="95"  y="146" width="72"  height="18" rx="2" fill="#4361ee" opacity="0.8"/>
  <text x="174" y="160" font-size="12" fill="#555">0.30</text>

  <text x="42"  y="190" font-size="13" font-weight="bold" fill="#c1121f">sat ←</text>
  <rect x="95"  y="176" width="48"  height="18" rx="2" fill="#4361ee" opacity="0.6"/>
  <text x="150" y="190" font-size="12" fill="#555">0.20</text>

  <text x="42"  y="220" font-size="13" fill="#2940b0">on</text>
  <rect x="95"  y="206" width="36"  height="18" rx="2" fill="#4361ee" opacity="0.5"/>
  <text x="138" y="220" font-size="12" fill="#555">0.15</text>

  <text x="42"  y="250" font-size="13" fill="#2940b0">the</text>
  <rect x="95"  y="236" width="24"  height="18" rx="2" fill="#4361ee" opacity="0.4"/>
  <text x="126" y="250" font-size="12" fill="#555">0.10</text>

  <text x="42"  y="280" font-size="13" fill="#2940b0">mat</text>
  <rect x="95"  y="266" width="48"  height="18" rx="2" fill="#4361ee" opacity="0.6"/>
  <text x="150" y="280" font-size="12" fill="#555">0.20</text>

  <text x="143" y="318" text-anchor="middle" font-size="11" fill="#555" font-style="italic">raw scores — can be any value</text>
  <text x="143" y="336" text-anchor="middle" font-size="11" fill="#555" font-style="italic">do not sum to 1</text>

  <!-- arrow 1→2 -->
  <line x1="266" y1="214" x2="300" y2="214" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="283" y="206" text-anchor="middle" font-size="10" fill="#888">softmax</text>

  <!-- STEP 2 -->
  <rect x="302" y="64" width="246" height="300" rx="10" fill="#fff4e0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="425" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#c07a00">② Attention Weights</text>
  <text x="425" y="103" text-anchor="middle" font-size="11" fill="#555">softmax → weights sum to 1</text>

  <text x="322" y="130" font-size="13" fill="#c07a00">The</text>
  <rect x="375" y="116" width="6"   height="18" rx="2" fill="#e07b00" opacity="0.3"/>
  <text x="388" y="130" font-size="12" fill="#555">0.05</text>

  <text x="322" y="160" font-size="13" fill="#c07a00">cat</text>
  <rect x="375" y="146" width="72"  height="18" rx="2" fill="#e07b00" opacity="0.9"/>
  <text x="454" y="160" font-size="12" fill="#555">0.30  ★</text>

  <text x="322" y="190" font-size="13" font-weight="bold" fill="#c1121f">sat ←</text>
  <rect x="375" y="176" width="48"  height="18" rx="2" fill="#e07b00" opacity="0.6"/>
  <text x="430" y="190" font-size="12" fill="#555">0.20</text>

  <text x="322" y="220" font-size="13" fill="#c07a00">on</text>
  <rect x="375" y="206" width="36"  height="18" rx="2" fill="#e07b00" opacity="0.5"/>
  <text x="418" y="220" font-size="12" fill="#555">0.15</text>

  <text x="322" y="250" font-size="13" fill="#c07a00">the</text>
  <rect x="375" y="236" width="24"  height="18" rx="2" fill="#e07b00" opacity="0.3"/>
  <text x="406" y="250" font-size="12" fill="#555">0.10</text>

  <text x="322" y="280" font-size="13" fill="#c07a00">mat</text>
  <rect x="375" y="266" width="48"  height="18" rx="2" fill="#e07b00" opacity="0.6"/>
  <text x="430" y="280" font-size="12" fill="#555">0.20  ★</text>

  <line x1="318" y1="300" x2="530" y2="300" stroke="#e07b00" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="425" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#c07a00">sum = 1.0  ✓</text>
  <text x="425" y="336" text-anchor="middle" font-size="11" fill="#555" font-style="italic">★ cat and mat most relevant to "sat"</text>

  <!-- arrow 2→3 -->
  <line x1="548" y1="214" x2="582" y2="214" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="565" y="200" text-anchor="middle" font-size="10" fill="#888">weighted</text>
  <text x="565" y="212" text-anchor="middle" font-size="10" fill="#888">sum</text>

  <!-- STEP 3 -->
  <rect x="584" y="64" width="256" height="300" rx="10" fill="#d1faf0" stroke="#087255" stroke-width="1.5"/>
  <text x="712" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#087255">③ Context Vector</text>
  <text x="712" y="103" text-anchor="middle" font-size="11" fill="#555">weighted sum of all token vectors</text>

  <text x="712" y="136" text-anchor="middle" font-size="12" fill="#aaa">0.05 · v(The)</text>
  <text x="712" y="158" text-anchor="middle" font-size="14" font-weight="bold" fill="#087255">+ 0.30 · v(cat)</text>
  <text x="712" y="180" text-anchor="middle" font-size="12" fill="#555">+ 0.20 · v(sat)</text>
  <text x="712" y="200" text-anchor="middle" font-size="12" fill="#aaa">+ 0.15 · v(on)</text>
  <text x="712" y="220" text-anchor="middle" font-size="12" fill="#aaa">+ 0.10 · v(the)</text>
  <text x="712" y="242" text-anchor="middle" font-size="14" font-weight="bold" fill="#087255">+ 0.20 · v(mat)</text>

  <line x1="600" y1="256" x2="828" y2="256" stroke="#087255" stroke-width="1.5"/>

  <text x="712" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">= new vector for "sat"</text>

  <rect x="604" y="288" width="224" height="50" rx="8" fill="#099268" stroke="#065f46" stroke-width="1.5"/>
  <text x="716" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="white">[ 0.31, -0.18, 0.67, ...]</text>
  <text x="716" y="328" text-anchor="middle" font-size="11" fill="#d1faf0">encodes "sat" in context of sentence</text>
</svg>
