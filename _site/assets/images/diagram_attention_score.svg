<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460" font-family="Arial, sans-serif">
  <rect width="860" height="460" fill="#f8faff" rx="14"/>
  <text x="430" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Self-Attention: 3-Step Process  ("rock" attends to sentence)</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2940b0"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#087255"/></marker>
  </defs>

  <!-- ══ STEP 1: Attention Scores ══ -->
  <rect x="20" y="44" width="246" height="390" rx="10" fill="#dde4ff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="143" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#2940b0">① Raw Scores</text>
  <text x="143" y="82" text-anchor="middle" font-size="11" fill="#555">dot product of each token</text>
  <text x="143" y="96" text-anchor="middle" font-size="11" fill="#555">with the query token ("rock")</text>

  <!-- Score bars for each token -->
  <!-- There: 0.01 -->
  <text x="44" y="126" font-size="13" fill="#2940b0">There</text>
  <rect x="110" y="112" width="8"  height="18" rx="2" fill="#4361ee" opacity="0.4"/>
  <text x="125" y="126" font-size="12" fill="#444">0.01</text>

  <!-- is: 0.01 -->
  <text x="44" y="158" font-size="13" fill="#2940b0">is</text>
  <rect x="110" y="144" width="8"  height="18" rx="2" fill="#4361ee" opacity="0.4"/>
  <text x="125" y="158" font-size="12" fill="#444">0.01</text>

  <!-- a: 0.01 -->
  <text x="44" y="190" font-size="13" fill="#2940b0">a</text>
  <rect x="110" y="176" width="8"  height="18" rx="2" fill="#4361ee" opacity="0.4"/>
  <text x="125" y="190" font-size="12" fill="#444">0.01</text>

  <!-- fluffy: 0.90 -->
  <text x="44" y="222" font-size="13" fill="#2940b0">fluffy</text>
  <rect x="110" y="208" width="108" height="18" rx="2" fill="#4361ee"/>
  <text x="225" y="222" font-size="12" fill="#444">0.90</text>

  <!-- pink: 0.80 -->
  <text x="44" y="254" font-size="13" fill="#2940b0">pink</text>
  <rect x="110" y="240" width="96"  height="18" rx="2" fill="#4361ee" opacity="0.9"/>
  <text x="213" y="254" font-size="12" fill="#444">0.80</text>

  <!-- rock: 0.01 -->
  <text x="44" y="286" font-size="13" font-weight="bold" fill="#c1121f">rock ←</text>
  <rect x="110" y="272" width="8"  height="18" rx="2" fill="#4361ee" opacity="0.4"/>
  <text x="125" y="286" font-size="12" fill="#444">0.01</text>

  <text x="143" y="322" text-anchor="middle" font-size="11" fill="#555" font-style="italic">xᵢ · x_query</text>
  <text x="143" y="340" text-anchor="middle" font-size="11" fill="#555" font-style="italic">for each token i</text>

  <!-- Arrow 1→2 -->
  <line x1="266" y1="240" x2="300" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="283" y="232" text-anchor="middle" font-size="10" fill="#888">softmax</text>

  <!-- ══ STEP 2: Attention Weights ══ -->
  <rect x="302" y="44" width="246" height="390" rx="10" fill="#fff4e0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="425" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#c07a00">② Attention Weights</text>
  <text x="425" y="82" text-anchor="middle" font-size="11" fill="#555">softmax normalizes scores</text>
  <text x="425" y="96" text-anchor="middle" font-size="11" fill="#555">so all weights sum to 1.0</text>

  <!-- Weight bars -->
  <text x="326" y="126" font-size="13" fill="#c07a00">There</text>
  <rect x="392" y="112" width="6"   height="18" rx="2" fill="#e07b00" opacity="0.3"/>
  <text x="404" y="126" font-size="12" fill="#444">0.01</text>

  <text x="326" y="158" font-size="13" fill="#c07a00">is</text>
  <rect x="392" y="144" width="6"   height="18" rx="2" fill="#e07b00" opacity="0.3"/>
  <text x="404" y="158" font-size="12" fill="#444">0.01</text>

  <text x="326" y="190" font-size="13" fill="#c07a00">a</text>
  <rect x="392" y="176" width="6"   height="18" rx="2" fill="#e07b00" opacity="0.3"/>
  <text x="404" y="190" font-size="12" fill="#444">0.01</text>

  <text x="326" y="222" font-size="13" fill="#c07a00">fluffy</text>
  <rect x="392" y="208" width="56"  height="18" rx="2" fill="#e07b00"/>
  <text x="454" y="222" font-size="12" fill="#444">0.47</text>

  <text x="326" y="254" font-size="13" fill="#c07a00">pink</text>
  <rect x="392" y="240" width="50"  height="18" rx="2" fill="#e07b00" opacity="0.85"/>
  <text x="448" y="254" font-size="12" fill="#444">0.42</text>

  <text x="326" y="286" font-size="13" font-weight="bold" fill="#c1121f">rock ←</text>
  <rect x="392" y="272" width="10"  height="18" rx="2" fill="#e07b00" opacity="0.3"/>
  <text x="408" y="286" font-size="12" fill="#444">0.08</text>

  <!-- Sum indicator -->
  <line x1="320" y1="304" x2="520" y2="304" stroke="#e07b00" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="425" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#c07a00">sum = 1.0  ✓</text>
  <text x="425" y="340" text-anchor="middle" font-size="11" fill="#555" font-style="italic">softmax(scores)</text>

  <!-- Arrow 2→3 -->
  <line x1="548" y1="240" x2="582" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="565" y="232" text-anchor="middle" font-size="10" fill="#888">weighted</text>
  <text x="565" y="244" text-anchor="middle" font-size="10" fill="#888">sum</text>

  <!-- ══ STEP 3: Context Vector ══ -->
  <rect x="584" y="44" width="256" height="390" rx="10" fill="#d1faf0" stroke="#087255" stroke-width="1.5"/>
  <text x="712" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#087255">③ Context Vector</text>
  <text x="712" y="82" text-anchor="middle" font-size="11" fill="#555">weighted sum of all token</text>
  <text x="712" y="96" text-anchor="middle" font-size="11" fill="#555">vectors = new "rock" vector</text>

  <!-- Equation -->
  <text x="712" y="130" text-anchor="middle" font-size="12" fill="#087255" font-style="italic">0.01 · v(There)</text>
  <text x="712" y="150" text-anchor="middle" font-size="11" fill="#aaa">+  0.01 · v(is)</text>
  <text x="712" y="168" text-anchor="middle" font-size="11" fill="#aaa">+  0.01 · v(a)</text>
  <text x="712" y="192" text-anchor="middle" font-size="14" fill="#087255" font-weight="bold">+  0.47 · v(fluffy)</text>
  <text x="712" y="214" text-anchor="middle" font-size="14" fill="#087255" font-weight="bold">+  0.42 · v(pink)</text>
  <text x="712" y="236" text-anchor="middle" font-size="11" fill="#aaa">+  0.08 · v(rock)</text>

  <line x1="604" y1="250" x2="830" y2="250" stroke="#087255" stroke-width="1.5"/>

  <!-- Output vector -->
  <text x="712" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">= context vector for "rock"</text>

  <rect x="610" y="284" width="224" height="50" rx="8" fill="#099268" stroke="#065f46" stroke-width="1.5"/>
  <text x="722" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="white">[ 0.38,  -0.21,  0.74, ...]</text>
  <text x="722" y="324" text-anchor="middle" font-size="11" fill="#d1faf0">encodes "fluffy pink rock"</text>

  <text x="712" y="364" text-anchor="middle" font-size="11" fill="#087255" font-style="italic">Σᵢ  weight(i) · v(i)</text>
</svg>
