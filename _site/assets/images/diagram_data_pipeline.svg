<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300" font-family="Arial, sans-serif">
  <rect width="860" height="300" fill="#f8faff" rx="14"/>

  <text x="430" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Data Collection Pipeline</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555"/></marker>
  </defs>

  <!-- Step 1: Human teleoperator -->
  <rect x="30"  y="90" width="150" height="100" rx="10" fill="#dde4ff" stroke="#4361ee" stroke-width="2"/>
  <text x="105" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#2940b0">Human</text>
  <text x="105" y="148" text-anchor="middle" font-size="13" fill="#2940b0">Teleoperator</text>
  <text x="105" y="168" text-anchor="middle" font-size="11" fill="#2940b0" font-style="italic">controls the arm</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="140" x2="218" y2="140" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Robot + Cameras -->
  <rect x="220" y="90" width="170" height="100" rx="10" fill="#ede9f8" stroke="#7b2d8b" stroke-width="2"/>
  <text x="305" y="122" text-anchor="middle" font-size="14" font-weight="bold" fill="#7b2d8b">Robot Arm</text>
  <text x="305" y="142" text-anchor="middle" font-size="12" fill="#7b2d8b">+ Cameras</text>
  <text x="305" y="162" text-anchor="middle" font-size="11" fill="#7b2d8b" font-style="italic">video frames</text>
  <text x="305" y="178" text-anchor="middle" font-size="11" fill="#7b2d8b" font-style="italic">joint states logged</text>

  <!-- Arrow 2 -->
  <line x1="390" y1="140" x2="428" y2="140" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Many episodes -->
  <rect x="430" y="90" width="170" height="100" rx="10" fill="#fff4e0" stroke="#e07b00" stroke-width="2"/>
  <text x="515" y="122" text-anchor="middle" font-size="14" font-weight="bold" fill="#c07a00">Many Episodes</text>
  <text x="515" y="142" text-anchor="middle" font-size="12" fill="#c07a00">repeated recordings</text>
  <text x="515" y="162" text-anchor="middle" font-size="11" fill="#c07a00" font-style="italic">of the same task</text>
  <text x="515" y="178" text-anchor="middle" font-size="11" fill="#c07a00" font-style="italic">with slight variation</text>

  <!-- Arrow 3 -->
  <line x1="600" y1="140" x2="638" y2="140" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Dataset -->
  <rect x="640" y="90" width="190" height="100" rx="10" fill="#d1faf0" stroke="#087255" stroke-width="2"/>
  <text x="735" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#087255">Dataset</text>
  <text x="735" y="138" text-anchor="middle" font-size="12" fill="#087255">(images, joint states,</text>
  <text x="735" y="156" text-anchor="middle" font-size="12" fill="#087255">actions) per timestep</text>
  <text x="735" y="176" text-anchor="middle" font-size="11" fill="#087255" font-style="italic">used to train ACT</text>

  <!-- Step labels below -->
  <text x="105" y="210" text-anchor="middle" font-size="11" fill="#888">① teleoperate</text>
  <text x="305" y="210" text-anchor="middle" font-size="11" fill="#888">② capture data</text>
  <text x="515" y="210" text-anchor="middle" font-size="11" fill="#888">③ repeat N times</text>
  <text x="735" y="210" text-anchor="middle" font-size="11" fill="#888">④ compile dataset</text>

  <!-- Each episode tuple label -->
  <rect x="140" y="240" width="580" height="36" rx="8" fill="#f0f0ff" stroke="#aab" stroke-width="1"/>
  <text x="430" y="263" text-anchor="middle" font-size="13" fill="#444">Each timestep stores:  <tspan font-weight="bold">image frames</tspan>  ·  <tspan font-weight="bold">joint states</tspan>  ·  <tspan font-weight="bold">action taken</tspan></text>
</svg>
