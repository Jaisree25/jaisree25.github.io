<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" width="860" height="360" font-family="Arial, sans-serif">
  <rect width="860" height="360" fill="#f8faff" rx="14"/>
  <text x="430" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Word Representations: One-Hot vs Dense Embedding</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555"/></marker>
  </defs>

  <!-- ══ LEFT: One-Hot ══ -->
  <rect x="20" y="44" width="370" height="290" rx="10" fill="#fff4f4" stroke="#c1121f" stroke-width="1.5"/>
  <text x="205" y="68" text-anchor="middle" font-size="15" font-weight="bold" fill="#c1121f">One-Hot Encoding</text>

  <!-- Word label -->
  <rect x="155" y="84" width="100" height="32" rx="6" fill="#ffe5ec" stroke="#c1121f" stroke-width="1.5"/>
  <text x="205" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#c1121f">"cat"  → ID 1</text>

  <!-- Sparse vector — show 12 cells, one lit -->
  <text x="205" y="134" text-anchor="middle" font-size="11" fill="#888">vector (vocab size = 10,000)</text>
  <!-- cells -->
  <rect x="60"  y="142" width="28" height="28" rx="3" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="74"  y="161" text-anchor="middle" font-size="10" fill="#999">0</text>
  <!-- index 1 = lit -->
  <rect x="92"  y="142" width="28" height="28" rx="3" fill="#c1121f" stroke="#c1121f" stroke-width="1"/>
  <text x="106" y="161" text-anchor="middle" font-size="10" font-weight="bold" fill="white">1</text>
  <rect x="124" y="142" width="28" height="28" rx="3" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="138" y="161" text-anchor="middle" font-size="10" fill="#999">0</text>
  <rect x="156" y="142" width="28" height="28" rx="3" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="170" y="161" text-anchor="middle" font-size="10" fill="#999">0</text>
  <rect x="188" y="142" width="28" height="28" rx="3" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="202" y="161" text-anchor="middle" font-size="10" fill="#999">0</text>
  <rect x="220" y="142" width="28" height="28" rx="3" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="234" y="161" text-anchor="middle" font-size="10" fill="#999">0</text>
  <rect x="252" y="142" width="28" height="28" rx="3" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="266" y="161" text-anchor="middle" font-size="10" fill="#999">0</text>
  <text x="295" y="161" font-size="13" fill="#aaa">· · ·</text>
  <rect x="320" y="142" width="28" height="28" rx="3" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="334" y="161" text-anchor="middle" font-size="10" fill="#999">0</text>

  <!-- index label -->
  <text x="106" y="183" text-anchor="middle" font-size="9" fill="#c1121f">index 1</text>

  <!-- Problems list -->
  <text x="205" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#c1121f">Problems</text>
  <text x="60"  y="232" font-size="12" fill="#555">✗  10,000 dimensions per word — enormous</text>
  <text x="60"  y="252" font-size="12" fill="#555">✗  "dog" and "puppy" are equally different</text>
  <text x="60"  y="272" font-size="12" fill="#555">   from each other as "dog" and "democracy"</text>
  <text x="60"  y="292" font-size="12" fill="#555">✗  No semantic meaning encoded</text>

  <!-- ══ RIGHT: Dense Embedding ══ -->
  <rect x="450" y="44" width="390" height="290" rx="10" fill="#f0fff8" stroke="#087255" stroke-width="1.5"/>
  <text x="645" y="68" text-anchor="middle" font-size="15" font-weight="bold" fill="#087255">Dense Embedding</text>

  <!-- Word labels + vectors -->
  <rect x="470" y="84" width="70" height="32" rx="6" fill="#d1faf0" stroke="#087255" stroke-width="1.5"/>
  <text x="505" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#087255">"cat"</text>

  <!-- Dense vector for cat -->
  <text x="645" y="100" text-anchor="middle" font-size="11" fill="#888">embedding (512 dimensions)</text>
  <rect x="548" y="108" width="34" height="22" rx="3" fill="#d1faf0" stroke="#087255" stroke-width="1"/>
  <text x="565" y="124" text-anchor="middle" font-size="10" fill="#087255">0.21</text>
  <rect x="586" y="108" width="34" height="22" rx="3" fill="#d1faf0" stroke="#087255" stroke-width="1"/>
  <text x="603" y="124" text-anchor="middle" font-size="10" fill="#087255">-0.54</text>
  <rect x="624" y="108" width="34" height="22" rx="3" fill="#d1faf0" stroke="#087255" stroke-width="1"/>
  <text x="641" y="124" text-anchor="middle" font-size="10" fill="#087255">0.83</text>
  <rect x="662" y="108" width="34" height="22" rx="3" fill="#d1faf0" stroke="#087255" stroke-width="1"/>
  <text x="679" y="124" text-anchor="middle" font-size="10" fill="#087255">0.12</text>
  <text x="712" y="124" font-size="12" fill="#aaa">· · ·</text>

  <!-- puppy vector -->
  <rect x="470" y="144" width="70" height="32" rx="6" fill="#d1faf0" stroke="#087255" stroke-width="1.5"/>
  <text x="505" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#087255">"puppy"</text>
  <rect x="548" y="148" width="34" height="22" rx="3" fill="#d1faf0" stroke="#087255" stroke-width="1"/>
  <text x="565" y="164" text-anchor="middle" font-size="10" fill="#087255">0.19</text>
  <rect x="586" y="148" width="34" height="22" rx="3" fill="#d1faf0" stroke="#087255" stroke-width="1"/>
  <text x="603" y="164" text-anchor="middle" font-size="10" fill="#087255">-0.51</text>
  <rect x="624" y="148" width="34" height="22" rx="3" fill="#d1faf0" stroke="#087255" stroke-width="1"/>
  <text x="641" y="164" text-anchor="middle" font-size="10" fill="#087255">0.80</text>
  <rect x="662" y="148" width="34" height="22" rx="3" fill="#d1faf0" stroke="#087255" stroke-width="1"/>
  <text x="679" y="164" text-anchor="middle" font-size="10" fill="#087255">0.10</text>
  <text x="712" y="164" font-size="12" fill="#aaa">· · ·</text>

  <!-- democracy vector -->
  <rect x="470" y="184" width="80" height="32" rx="6" fill="#ede9f8" stroke="#7b2d8b" stroke-width="1.5"/>
  <text x="510" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b2d8b">"democracy"</text>
  <rect x="556" y="188" width="34" height="22" rx="3" fill="#ede9f8" stroke="#7b2d8b" stroke-width="1"/>
  <text x="573" y="204" text-anchor="middle" font-size="10" fill="#7b2d8b">-0.88</text>
  <rect x="594" y="188" width="34" height="22" rx="3" fill="#ede9f8" stroke="#7b2d8b" stroke-width="1"/>
  <text x="611" y="204" text-anchor="middle" font-size="10" fill="#7b2d8b">0.43</text>
  <rect x="632" y="188" width="34" height="22" rx="3" fill="#ede9f8" stroke="#7b2d8b" stroke-width="1"/>
  <text x="649" y="204" text-anchor="middle" font-size="10" fill="#7b2d8b">-0.31</text>
  <rect x="670" y="188" width="34" height="22" rx="3" fill="#ede9f8" stroke="#7b2d8b" stroke-width="1"/>
  <text x="687" y="204" text-anchor="middle" font-size="10" fill="#7b2d8b">0.67</text>
  <text x="720" y="204" font-size="12" fill="#aaa">· · ·</text>

  <!-- Similarity annotations -->
  <line x1="542" y1="130" x2="542" y2="148" stroke="#087255" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="810" y="140" text-anchor="end" font-size="11" fill="#087255" font-weight="bold">← similar vectors</text>
  <text x="810" y="153" text-anchor="end" font-size="10" fill="#087255">(high dot product)</text>
  <text x="810" y="196" text-anchor="end" font-size="11" fill="#7b2d8b" font-weight="bold">← very different</text>
  <text x="810" y="209" text-anchor="end" font-size="10" fill="#7b2d8b">(low dot product)</text>

  <!-- Benefits -->
  <text x="645" y="236" text-anchor="middle" font-size="13" font-weight="bold" fill="#087255">Benefits</text>
  <text x="470" y="256" font-size="12" fill="#555">✓  Only 512 dimensions — compact</text>
  <text x="470" y="276" font-size="12" fill="#555">✓  Similar words have similar vectors</text>
  <text x="470" y="296" font-size="12" fill="#555">✓  Learned end-to-end during training</text>
</svg>
