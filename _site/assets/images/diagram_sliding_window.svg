<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 310" width="860" height="310" font-family="Arial, sans-serif">
  <rect width="860" height="310" fill="#f8faff" rx="14"/>
  <text x="430" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Sliding Window Data Sampling</text>
  <text x="430" y="46" text-anchor="middle" font-size="13" fill="#555" font-style="italic">Token sequence: [2, 5, 9, 3, 1, 7, 4, 8]  ·  Context length = 4  ·  Stride = 1</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2940b0"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#087255"/></marker>
  </defs>

  <!-- Full token sequence across top -->
  <!-- 8 tokens, each 80px wide, starting at x=60 -->
  <!-- tokens: 2,5,9,3,1,7,4,8 -->
  <!-- x centers: 100,180,260,340,420,500,580,660 -->

  <!-- Base token boxes (grey) -->
  <rect x="60"  y="62" width="76" height="40" rx="6" fill="#e8eaf6" stroke="#aaa" stroke-width="1.5"/>
  <text x="98"  y="87" text-anchor="middle" font-size="18" font-weight="bold" fill="#555">2</text>
  <rect x="140" y="62" width="76" height="40" rx="6" fill="#e8eaf6" stroke="#aaa" stroke-width="1.5"/>
  <text x="178" y="87" text-anchor="middle" font-size="18" font-weight="bold" fill="#555">5</text>
  <rect x="220" y="62" width="76" height="40" rx="6" fill="#e8eaf6" stroke="#aaa" stroke-width="1.5"/>
  <text x="258" y="87" text-anchor="middle" font-size="18" font-weight="bold" fill="#555">9</text>
  <rect x="300" y="62" width="76" height="40" rx="6" fill="#e8eaf6" stroke="#aaa" stroke-width="1.5"/>
  <text x="338" y="87" text-anchor="middle" font-size="18" font-weight="bold" fill="#555">3</text>
  <rect x="380" y="62" width="76" height="40" rx="6" fill="#e8eaf6" stroke="#aaa" stroke-width="1.5"/>
  <text x="418" y="87" text-anchor="middle" font-size="18" font-weight="bold" fill="#555">1</text>
  <rect x="460" y="62" width="76" height="40" rx="6" fill="#e8eaf6" stroke="#aaa" stroke-width="1.5"/>
  <text x="498" y="87" text-anchor="middle" font-size="18" font-weight="bold" fill="#555">7</text>
  <rect x="540" y="62" width="76" height="40" rx="6" fill="#e8eaf6" stroke="#aaa" stroke-width="1.5"/>
  <text x="578" y="87" text-anchor="middle" font-size="18" font-weight="bold" fill="#555">4</text>
  <rect x="620" y="62" width="76" height="40" rx="6" fill="#e8eaf6" stroke="#aaa" stroke-width="1.5"/>
  <text x="658" y="87" text-anchor="middle" font-size="18" font-weight="bold" fill="#555">8</text>

  <!-- Window 1: tokens 0-3 = [2,5,9,3], target [5,9,3,1] -->
  <!-- Blue bracket over positions 0-3 -->
  <rect x="58" y="60" width="320" height="44" rx="6" fill="none" stroke="#4361ee" stroke-width="3"/>
  <text x="218" y="120" text-anchor="middle" font-size="11" fill="#4361ee" font-weight="bold">window 1</text>

  <!-- 4 input-target rows -->
  <!-- Row layout: label | input box | arrow | target box -->

  <!-- Row 1 -->
  <text x="30" y="162" text-anchor="middle" font-size="11" fill="#888" font-style="italic">① </text>
  <rect x="36"  y="144" width="216" height="34" rx="6" fill="#dde4ff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="60"  y="157" font-size="11" fill="#2940b0" font-weight="bold">Input:</text>
  <text x="120" y="157" font-size="13" fill="#2940b0">[ 2,  5,  9,  3 ]</text>
  <line x1="254" y1="161" x2="278" y2="161" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="282" y="144" width="216" height="34" rx="6" fill="#d1faf0" stroke="#087255" stroke-width="1.5"/>
  <text x="306" y="157" font-size="11" fill="#087255" font-weight="bold">Target:</text>
  <text x="366" y="157" font-size="13" fill="#087255">[ 5,  9,  3,  1 ]</text>

  <!-- Row 2 -->
  <rect x="36"  y="184" width="216" height="34" rx="6" fill="#dde4ff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="60"  y="197" font-size="11" fill="#2940b0" font-weight="bold">Input:</text>
  <text x="120" y="197" font-size="13" fill="#2940b0">[ 5,  9,  3,  1 ]</text>
  <line x1="254" y1="201" x2="278" y2="201" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="282" y="184" width="216" height="34" rx="6" fill="#d1faf0" stroke="#087255" stroke-width="1.5"/>
  <text x="306" y="197" font-size="11" fill="#087255" font-weight="bold">Target:</text>
  <text x="366" y="197" font-size="13" fill="#087255">[ 9,  3,  1,  7 ]</text>

  <!-- Row 3 -->
  <rect x="36"  y="224" width="216" height="34" rx="6" fill="#dde4ff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="60"  y="237" font-size="11" fill="#2940b0" font-weight="bold">Input:</text>
  <text x="120" y="237" font-size="13" fill="#2940b0">[ 9,  3,  1,  7 ]</text>
  <line x1="254" y1="241" x2="278" y2="241" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="282" y="224" width="216" height="34" rx="6" fill="#d1faf0" stroke="#087255" stroke-width="1.5"/>
  <text x="306" y="237" font-size="11" fill="#087255" font-weight="bold">Target:</text>
  <text x="366" y="237" font-size="13" fill="#087255">[ 3,  1,  7,  4 ]</text>

  <!-- Row 4 -->
  <rect x="36"  y="264" width="216" height="34" rx="6" fill="#dde4ff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="60"  y="277" font-size="11" fill="#2940b0" font-weight="bold">Input:</text>
  <text x="120" y="277" font-size="13" fill="#2940b0">[ 3,  1,  7,  4 ]</text>
  <line x1="254" y1="281" x2="278" y2="281" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="282" y="264" width="216" height="34" rx="6" fill="#d1faf0" stroke="#087255" stroke-width="1.5"/>
  <text x="306" y="277" font-size="11" fill="#087255" font-weight="bold">Target:</text>
  <text x="366" y="277" font-size="13" fill="#087255">[ 1,  7,  4,  8 ]</text>

  <!-- Stride arrow -->
  <line x1="60" y1="112" x2="140" y2="112" stroke="#4361ee" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-b)"/>
  <text x="100" y="108" text-anchor="middle" font-size="10" fill="#4361ee">stride 1</text>

  <!-- Right side explanation -->
  <rect x="540" y="144" width="300" height="154" rx="8" fill="#fff4e0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="690" y="166" text-anchor="middle" font-size="13" font-weight="bold" fill="#c07a00">How to read each pair</text>
  <text x="556" y="188" font-size="12" fill="#555">Each input token predicts the next:</text>
  <text x="556" y="208" font-size="12" fill="#555">  given  2  → predict  5</text>
  <text x="556" y="226" font-size="12" fill="#555">  given  2, 5  → predict  9</text>
  <text x="556" y="244" font-size="12" fill="#555">  given  2, 5, 9  → predict  3</text>
  <text x="556" y="262" font-size="12" fill="#555">  given  2, 5, 9, 3  → predict  1</text>
  <text x="556" y="284" font-size="11" fill="#888" font-style="italic">One window = four training examples</text>
</svg>
