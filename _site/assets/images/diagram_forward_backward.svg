<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" width="820" height="400" font-family="Arial, sans-serif">
  <rect width="820" height="400" fill="#f8faff" rx="14"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Forward Pass &amp; Backward Pass</text>

  <!-- ── Boxes ── -->
  <!-- Input -->
  <rect x="30" y="100" width="140" height="80" rx="10" fill="#dde4ff" stroke="#4361ee" stroke-width="2.5"/>
  <text x="100" y="134" text-anchor="middle" font-size="15" font-weight="bold" fill="#2940b0">Input</text>
  <text x="100" y="156" text-anchor="middle" font-size="12" fill="#2940b0">Features x₁…x₁₀</text>

  <!-- Hidden -->
  <rect x="230" y="100" width="140" height="80" rx="10" fill="#ede9f8" stroke="#7b2d8b" stroke-width="2.5"/>
  <text x="300" y="134" text-anchor="middle" font-size="15" font-weight="bold" fill="#7b2d8b">Hidden Layers</text>
  <text x="300" y="156" text-anchor="middle" font-size="12" fill="#7b2d8b">Weights + ReLU</text>

  <!-- Output -->
  <rect x="430" y="100" width="140" height="80" rx="10" fill="#ffe5ec" stroke="#c1121f" stroke-width="2.5"/>
  <text x="500" y="134" text-anchor="middle" font-size="15" font-weight="bold" fill="#c1121f">Output</text>
  <text x="500" y="156" text-anchor="middle" font-size="12" fill="#c1121f">ŷ  (Sigmoid)</text>

  <!-- Loss -->
  <rect x="630" y="100" width="160" height="80" rx="10" fill="#fff4e0" stroke="#e07b00" stroke-width="2.5"/>
  <text x="710" y="130" text-anchor="middle" font-size="15" font-weight="bold" fill="#e07b00">Loss Function</text>
  <text x="710" y="150" text-anchor="middle" font-size="13" fill="#e07b00">L = (ŷ − y)²</text>
  <text x="710" y="170" text-anchor="middle" font-size="12" fill="#e07b00">error = 0.04</text>

  <!-- ── Arrow markers ── -->
  <defs>
    <marker id="fwd" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#2940b0"/>
    </marker>
    <marker id="bwd" markerWidth="10" markerHeight="10" refX="2" refY="3.5" orient="auto-start-reverse">
      <path d="M0,3.5 L10,0 L10,7 z" fill="#c1121f"/>
    </marker>
    <marker id="upd" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#099268"/>
    </marker>
  </defs>

  <!-- Forward arrows (top) -->
  <line x1="170" y1="130" x2="228" y2="130" stroke="#2940b0" stroke-width="2.5" marker-end="url(#fwd)"/>
  <line x1="370" y1="130" x2="428" y2="130" stroke="#2940b0" stroke-width="2.5" marker-end="url(#fwd)"/>
  <line x1="570" y1="130" x2="628" y2="130" stroke="#2940b0" stroke-width="2.5" marker-end="url(#fwd)"/>

  <!-- Forward label -->
  <text x="410" y="90" text-anchor="middle" font-size="14" fill="#2940b0" font-weight="bold">→  Forward Pass  (data flows left to right)</text>

  <!-- Backward path (below boxes) -->
  <!-- vertical drops -->
  <line x1="710" y1="180" x2="710" y2="228" stroke="#c1121f" stroke-width="2.5"/>
  <line x1="100" y1="228" x2="100" y2="180" stroke="#c1121f" stroke-width="2.5"/>
  <!-- horizontal dashed -->
  <line x1="100" y1="228" x2="710" y2="228" stroke="#c1121f" stroke-width="2.5" stroke-dasharray="8,4"/>
  <!-- vertical rises at each box -->
  <line x1="300" y1="228" x2="300" y2="180" stroke="#c1121f" stroke-width="2.5"/>
  <line x1="500" y1="228" x2="500" y2="180" stroke="#c1121f" stroke-width="2.5"/>

  <!-- Backward label -->
  <text x="410" y="260" text-anchor="middle" font-size="14" fill="#c1121f" font-weight="bold">←  Backward Pass  (gradients flow right to left)</text>

  <!-- Weight Update box -->
  <rect x="230" y="290" width="360" height="60" rx="10" fill="#d1faf0" stroke="#099268" stroke-width="2.5"/>
  <text x="410" y="316" text-anchor="middle" font-size="15" font-weight="bold" fill="#087255">Weight Update</text>
  <text x="410" y="338" text-anchor="middle" font-size="14" fill="#087255">W ← W − η · ∂L/∂W</text>

  <!-- Arrow from Loss down to Weight Update -->
  <line x1="710" y1="235" x2="590" y2="288" stroke="#099268" stroke-width="2.5" marker-end="url(#upd)"/>

  <!-- Legend -->
  <rect x="30" y="368" width="760" height="28" rx="7" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <line x1="50" y1="382" x2="90" y2="382" stroke="#2940b0" stroke-width="2.5"/>
  <text x="98" y="387" font-size="13" fill="#333">Forward pass</text>
  <line x1="250" y1="382" x2="290" y2="382" stroke="#c1121f" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="298" y="387" font-size="13" fill="#333">Backward pass (gradients)</text>
  <line x1="530" y1="382" x2="570" y2="382" stroke="#099268" stroke-width="2.5"/>
  <text x="578" y="387" font-size="13" fill="#333">Weight update</text>
</svg>
